<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ動画サイト</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: white;
            text-align: center;
        }
        .video-container {
            max-width: 800px;
            margin: 20px auto;
            background: #000;
            padding: 10px;
        }
        video {
            width: 100%; /* レスポンシブ対応 */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>おすすめの動画</h1>

    <div class="video-container">
        <video controls poster="thumbnail.jpg">
            <source src="movie.mp4" type="video/mp4">
            お使いのブラウザは動画タグに対応していません。
        </video>
        <h3>動画のタイトル</h3>
        <p>ここに動画の説明文が入ります。</p>
    </div>

</body>
</html>
